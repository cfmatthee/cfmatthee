<svg width="300" height="160" viewBox="0 0 300 160" fill="none" role="img" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header {font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #2f80ed; }
    .lang-name {font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #888; }
  </style>
  <rect x="0.5" y="0.5" rx="4.5" width="299" height="159" stroke="#888" stroke-opacity="1" fill="none" />
  <g transform="translate(15,25)"><text x="0" y="0" class="header">Most Used Languages</text></g>
  <g transform="translate(15,45)">
    <mask id="lang-mask"><rect x="0" y="0" width="270" height="8" rx="5" fill="#fff" /></mask>
    <rect mask="url(#lang-mask)" x="0" y="0" width="141" height="8" fill="#3D6117" />
    <g transform="translate(15.0,40)"><circle cx="5" cy="5" r="5" fill="#3D6117" /><text x="15" y="10" class="lang-name">TeX (51.9%)</text></g>
    <rect mask="url(#lang-mask)" x="140" y="0" width="50" height="8" fill="#3572A5" />
    <g transform="translate(150.0,40)"><circle cx="5" cy="5" r="5" fill="#3572A5" /><text x="15" y="10" class="lang-name">Python (18.1%)</text></g>
    <rect mask="url(#lang-mask)" x="189" y="0" width="42" height="8" fill="#dea584" />
    <g transform="translate(15.0,60)"><circle cx="5" cy="5" r="5" fill="#dea584" /><text x="15" y="10" class="lang-name">Rust (15.4%)</text></g>
    <rect mask="url(#lang-mask)" x="230" y="0" width="15" height="8" fill="#f1e05a" />
    <g transform="translate(150.0,60)"><circle cx="5" cy="5" r="5" fill="#f1e05a" /><text x="15" y="10" class="lang-name">JavaScript (5.2%)</text></g>
    <rect mask="url(#lang-mask)" x="244" y="0" width="11" height="8" fill="#ff5a03" />
    <g transform="translate(15.0,80)"><circle cx="5" cy="5" r="5" fill="#ff5a03" /><text x="15" y="10" class="lang-name">Astro (3.6%)</text></g>
    <rect mask="url(#lang-mask)" x="254" y="0" width="6" height="8" fill="#fcb32c" />
    <g transform="translate(150.0,80)"><circle cx="5" cy="5" r="5" fill="#fcb32c" /><text x="15" y="10" class="lang-name">MDX (1.7%)</text></g>
    <rect mask="url(#lang-mask)" x="259" y="0" width="12" height="8" fill="#888" />
  </g>
</svg>

<svg width="300" height="160" viewBox="0 0 300 160" fill="none" role="img" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header {font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #2f80ed; }
    .lang-name {font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #888; }
  </style>
  <rect x="0.5" y="0.5" rx="4.5" width="299" height="159" stroke="#888" stroke-opacity="1" fill="none" />
  <g transform="translate(15,25)"><text x="0" y="0" class="header">Most Used Languages</text></g>
  <g transform="translate(15,45)">
    <mask id="lang-mask"><rect x="0" y="0" width="270" height="8" rx="5" fill="#fff" /></mask>
    <rect mask="url(#lang-mask)" x="0" y="0" width="121" height="8" fill="#3D6117" />
    <g transform="translate(15.0,40)"><circle cx="5" cy="5" r="5" fill="#3D6117" /><text x="15" y="10" class="lang-name">TeX (44.4%)</text></g>
    <rect mask="url(#lang-mask)" x="120" y="0" width="58" height="8" fill="#3572A5" />
    <g transform="translate(150.0,40)"><circle cx="5" cy="5" r="5" fill="#3572A5" /><text x="15" y="10" class="lang-name">Python (21.0%)</text></g>
    <rect mask="url(#lang-mask)" x="177" y="0" width="48" height="8" fill="#dea584" />
    <g transform="translate(15.0,60)"><circle cx="5" cy="5" r="5" fill="#dea584" /><text x="15" y="10" class="lang-name">Rust (17.5%)</text></g>
    <rect mask="url(#lang-mask)" x="224" y="0" width="15" height="8" fill="#3178c6" />
    <g transform="translate(150.0,60)"><circle cx="5" cy="5" r="5" fill="#3178c6" /><text x="15" y="10" class="lang-name">TypeScript (5.2%)</text></g>
    <rect mask="url(#lang-mask)" x="238" y="0" width="13" height="8" fill="#ff5a03" />
    <g transform="translate(15.0,80)"><circle cx="5" cy="5" r="5" fill="#ff5a03" /><text x="15" y="10" class="lang-name">Astro (4.5%)</text></g>
    <rect mask="url(#lang-mask)" x="250" y="0" width="10" height="8" fill="#00B4AB" />
    <g transform="translate(150.0,80)"><circle cx="5" cy="5" r="5" fill="#00B4AB" /><text x="15" y="10" class="lang-name">Dart (3.4%)</text></g>
    <rect mask="url(#lang-mask)" x="259" y="0" width="12" height="8" fill="#888" />
  </g>
</svg>
